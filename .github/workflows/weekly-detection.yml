name: Reset Radar weekly detection

# Runs every Monday at 06:00 UTC. Calls the backend's internal job
# endpoint which recomputes every user's stuck scores and fires
# nudges where the trigger rule says yes.
#
# Per architecture.md section 10. The workflow ships final in R0
# even though the endpoint it invokes is a 501 stub until R1 wires
# the mock-mode detection job (and R4 wires the real Spotify path).
#
# Required GitHub secrets:
#   - RESET_RADAR_BACKEND_URL: e.g. https://reset-radar.onrender.com
#     (in R0, leave unset and the run no-ops with a warning)
#   - RESET_RADAR_INTERNAL_TOKEN: shared secret the backend verifies
#     before running the job (added in R6 with auth)

on:
  schedule:
    # Mondays at 06:00 UTC (= 11:30 IST). cron format: m h dom mon dow
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run without writing any nudges to the DB"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  run-weekly-detection:
    name: Trigger backend detection job
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Verify backend URL is configured
        id: check_url
        env:
          BACKEND_URL: ${{ secrets.RESET_RADAR_BACKEND_URL }}
        run: |
          if [ -z "$BACKEND_URL" ]; then
            echo "::warning::RESET_RADAR_BACKEND_URL secret is not set; skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: POST /jobs/run-weekly-detection
        if: steps.check_url.outputs.skip == 'false'
        env:
          BACKEND_URL: ${{ secrets.RESET_RADAR_BACKEND_URL }}
          INTERNAL_TOKEN: ${{ secrets.RESET_RADAR_INTERNAL_TOKEN }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          curl --fail --silent --show-error \
            --max-time 480 \
            -X POST "$BACKEND_URL/jobs/run-weekly-detection" \
            -H "Content-Type: application/json" \
            -H "X-Internal-Token: $INTERNAL_TOKEN" \
            -d "{\"dry_run\": $DRY_RUN}" \
            -o response.json
          echo "--- response.json ---"
          cat response.json

      - name: Upload run artefact
        if: steps.check_url.outputs.skip == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: weekly-detection-response-${{ github.run_id }}
          path: response.json
          retention-days: 30
